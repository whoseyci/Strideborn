<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    canvas { display: block; }
  </style>
  <!--
    TODO (production): replace CDN imports with local assets:
      assets/vendor/three.module.js
      assets/vendor/GLTFLoader.js
    CDN requires internet — bundle for offline use.
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Slot → bone name mapping ─────────────────────────────
// Expand this list as new bones are added to BaseCharacter.
const SLOT_BONES = {
  helmet:  ['Head'],
  chest:   ['Pelvis', 'L-Arm', 'R-Arm', 'L-Forearm', 'R-Forearm', 'L-Hand', 'R-Hand'],
  legs:    ['L-Thigh', 'R-Thigh', 'L-Calf', 'R-Calf'],
  boots:   ['L-Foot', 'R-Foot'],
  // weapon / offhand are attachment objects, not body swaps — handled separately
};

// ─── Renderer ────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── Scene + Camera ──────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.6, 5.5);
camera.lookAt(0, 1.2, 0);
window.camera = camera; // expose for Flutter JS bridge

// ─── Lighting ────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.4);
keyLight.position.set(1, 3, 2);
scene.add(keyLight);
const rimLight = new THREE.DirectionalLight(0xD4A84B, 0.5); // gold rim, matches app primary
rimLight.position.set(-2, 1, -3);
scene.add(rimLight);

// ─── State ───────────────────────────────────────────────
const loader = new GLTFLoader();
let baseGltf    = null;
let mixer       = null;
let punchAction = null;
const clock     = new THREE.Clock();

// Caches loaded armor GLTFs by set name (e.g. 'demon') to avoid re-fetching
const armorCache = {};

// Per-bone: original base meshes that were hidden, so we can restore them
// boneName → THREE.Mesh[]
const hiddenBase = {};

// Per-bone: armor meshes that were added as children
// boneName → THREE.Mesh[]
const addedArmor = {};

// ─── Utilities ───────────────────────────────────────────
function findNode(root, name) {
  let found = null;
  root.traverse(obj => { if (obj.name === name) found = obj; });
  return found;
}

function directMeshes(node) {
  return node.children.filter(c => c.isMesh);
}

// Use fetch→ArrayBuffer→parse instead of loader.load().
// loader.load() internally tries to postMessage a Request object into a Worker,
// which throws DataCloneError inside WebView's sandboxed file:// context.
async function loadGltf(path) {
  try {
    const res = await fetch(path);
    if (!res.ok) return null;
    const buf = await res.arrayBuffer();
    return await new Promise((resolve, reject) =>
      loader.parse(buf, '', resolve, reject)
    );
  } catch {
    return null; // file missing or parse failed — caller falls back to base mesh
  }
}

// ─── Armor swap ──────────────────────────────────────────
function applyArmorBone(boneName, armorGltf, slot) {
  if (!baseGltf) return;
  const baseBone  = findNode(baseGltf.scene, boneName);
  const armorBone = findNode(armorGltf.scene, boneName);
  if (!baseBone || !armorBone) return; // bone not in this armor set — skip silently

  // Hide base meshes for this bone (only if not already hidden by another slot)
  const baseMeshes = directMeshes(baseBone).filter(m => m.visible);
  baseMeshes.forEach(m => { m.visible = false; });
  if (baseMeshes.length) {
    hiddenBase[boneName] = [...(hiddenBase[boneName] || []), ...baseMeshes];
  }

  // Clone armor meshes and parent them onto the matching base bone.
  // Positions are defined in bone-local space in the .bbmodel, so cloning
  // and re-parenting preserves correct placement — as long as bone origins match.
  directMeshes(armorBone).forEach(m => {
    const clone = m.clone();
    clone.userData.armorSlot = slot;
    baseBone.add(clone);
    addedArmor[boneName] = [...(addedArmor[boneName] || []), clone];
  });
}

function restoreSlot(slot) {
  if (!baseGltf) return;
  const bones = SLOT_BONES[slot] || [];
  bones.forEach(boneName => {
    const baseBone = findNode(baseGltf.scene, boneName);
    if (!baseBone) return;

    // Remove armor meshes that belong to this slot
    const keep   = (addedArmor[boneName] || []).filter(m => m.userData.armorSlot !== slot);
    const remove = (addedArmor[boneName] || []).filter(m => m.userData.armorSlot === slot);
    remove.forEach(m => baseBone.remove(m));
    addedArmor[boneName] = keep;

    // Restore hidden base meshes only if no other slot is still covering this bone
    const stillCovered = keep.length > 0;
    if (!stillCovered && hiddenBase[boneName]?.length) {
      hiddenBase[boneName].forEach(m => { m.visible = true; });
      hiddenBase[boneName] = [];
    }
  });
}

// equipped: { helmet: 'demon' | null, chest: 'demon' | null, ... }
// Slots with null / missing model fall back to base character meshes.
async function updateArmor(equipped) {
  // Restore all slots first so we start clean
  Object.keys(SLOT_BONES).forEach(slot => restoreSlot(slot));

  // Group slots by set name to load each GLB only once
  const setToSlots = {};
  Object.entries(equipped).forEach(([slot, setName]) => {
    if (!setName) return; // no model — base character shows through (fallback)
    (setToSlots[setName] ??= []).push(slot);
  });

  for (const [setName, slots] of Object.entries(setToSlots)) {
    if (!armorCache[setName]) {
      // GLBs live at assets/models/armor/<setName>.glb
      armorCache[setName] = await loadGltf(`http://localhost:8585/assets/models/armor/${setName}.glb`);
    }
    const armorGltf = armorCache[setName];
    if (!armorGltf) continue; // file missing — silently skip, base shows through

    slots.forEach(slot => {
      (SLOT_BONES[slot] || []).forEach(boneName => applyArmorBone(boneName, armorGltf, slot));
    });
  }
}

// ─── Punch ───────────────────────────────────────────────
function triggerPunch() {
  if (!punchAction) return;
  // Reset to frame 0 so rapid taps always give feedback
  punchAction.reset();
}

// ─── Load base character ─────────────────────────────────
console.log('[3D] script started — fetching BaseCharacter.glb');
loadGltf('http://localhost:8585/assets/models/BaseCharacter.glb').then(gltf => {
  if (!gltf) {
    console.error('[3D] BaseCharacter.glb failed to load — check asset path and pubspec registration');
    return;
  }
  console.log('[3D] BaseCharacter.glb parsed OK');
  baseGltf = gltf;

  // Fit model into view
  const box    = new THREE.Box3().setFromObject(gltf.scene);
  const size   = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const scale  = 1.05 / size.y;
  gltf.scene.scale.setScalar(scale);
  gltf.scene.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);

  scene.add(gltf.scene);

  // Animations — only 'Punch' exists right now; play it looped as default.
  // Add 'Walk' / 'Idle' clips to the bbmodel when available and update here.
  mixer = new THREE.AnimationMixer(gltf.scene);
  if (gltf.animations.length) {
    const clip  = THREE.AnimationClip.findByName(gltf.animations, 'Punch') ?? gltf.animations[0];
    punchAction = mixer.clipAction(clip);
    punchAction.setLoop(THREE.LoopRepeat);
    punchAction.play();
  }

  // Tell Flutter the model is ready so it can push the initial armor state
  console.log('[3D] scene ready — calling onModelReady');
  if (window.flutter_inappwebview) {
    window.flutter_inappwebview.callHandler('onModelReady');
  }
});

// ─── Message handler (Flutter → JS) ──────────────────────
// Called via: controller.evaluateJavascript(source: 'handleMessage(${jsonEncode(msg)})')
window.handleMessage = async function(msg) {
  switch (msg.type) {
    case 'punch':
      triggerPunch();
      break;
    case 'updateArmor':
      await updateArmor(msg.equipped ?? {});
      break;
  }
};

// ─── Tap → Flutter ───────────────────────────────────────
// Handling the click inside JS avoids the WebView swallowing GestureDetector taps.
renderer.domElement.addEventListener('click', () => {
  if (window.flutter_inappwebview) {
    window.flutter_inappwebview.callHandler('onTap');
  }
});

// ─── Render loop ─────────────────────────────────────────
(function animate() {
  requestAnimationFrame(animate);
  if (mixer) mixer.update(clock.getDelta());
  renderer.render(scene, camera);
})();

// ─── Resize ──────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
