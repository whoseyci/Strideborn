name: Build Flutter Web → Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-blocking for now)
        run: flutter analyze || true

      - name: Run tests (if any)
        run: |
          if [ -d test ] && ls test/*_test.dart >/dev/null 2>&1; then
            flutter test
          else
            echo "no tests yet — skipping"
          fi

      # GitHub Pages serves at /Strideborn/ — base-href must match, including slashes
      - name: Build web
        run: flutter build web --release --base-href "/Strideborn/"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
